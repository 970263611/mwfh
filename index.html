<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跨系统文件文字交互工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto
    }

    :root {
      --primary: #165DFF;
      --primary-hover: #0E42D2;
      --danger: #F53F3F;
      --danger-hover: #D83636;
      --text-primary: #1D2129;
      --text-secondary: #4E5969;
      --text-tertiary: #86909C;
      --border: #E5E6EB;
      --border-hover: #C9CDD4;
      --bg-light: #F7F8FA;
      --bg-hover: #F2F3F5;
      --dark-bg: #1E1E2E;
      --card-radius: 10px;
      --btn-radius: 6px;
    }

    html, body {
      height: 100vh;
      min-width: 320px;
      overflow: hidden;
      background: var(--bg-light);
      color: var(--text-primary);
    }

    /* 外层容器：上下两大块 */
    .wrapper {
      width: 100%;
      height: 100%;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 通用区块：每一块都是左右分栏 */
    .section {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    /* 上半块：占38%高度，左右各50% */
    .top-section {
      flex: 0 0 38%;
    }

    .top-section .card {
      flex: 1;
    }

    /* 下半块：占剩余全部高度，日志80% 节点20% */
    .bottom-section {
      flex: 1;
      min-height: 0;
    }

    .bottom-section .log-card {
      flex: 8;
    }

    .bottom-section .node-card {
      flex: 2;
      min-width: 260px;
    }

    /* 通用卡片样式 - 所有屏幕下保持一致 */
    .card {
      background: #fff;
      border-radius: var(--card-radius);
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .card-title::before {
      content: "";
      width: 4px;
      height: 16px;
      background: var(--primary);
      border-radius: 2px;
    }

    /* 节点列表 - 修复按钮溢出 */
    .node-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .node-item {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-light);
      gap: 8px;
    }

    .node-info {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .node-info .name {
      font-weight: 500;
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-info .addr {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-opt {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    /* 表单控件 - 样式全尺寸保持一致 */
    .form-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input, textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--btn-radius);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      color: var(--text-primary);
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: var(--primary)
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 60px;
      line-height: 1.5;
    }

    /* 错误提示 */
    .form-error {
      color: var(--danger);
      font-size: 12px;
      line-height: 1.4;
      display: none;
    }

    /* 文件上传区 - 样式保持一致 */
    .upload-area {
      flex: 1;
      border: 2px dashed var(--border);
      border-radius: var(--btn-radius);
      padding: 20px 10px;
      text-align: center;
      cursor: pointer;
      transition: .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .upload-area:hover {
      border-color: var(--primary);
      background: rgba(22, 93, 255, 0.02);
    }

    .upload-area input {
      display: none
    }

    .upload-area div:first-of-type {
      font-size: 28px;
      opacity: 0.8;
    }

    .upload-tip {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    /* 统一按钮样式 - 全尺寸视觉完全一致 */
    .btn {
      height: 32px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: var(--btn-radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
      background: #fff;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .btn-sm {
      height: 24px;
      padding: 0 10px;
      font-size: 12px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .btn-default {
      background: #fff;
      color: var(--text-primary);
      border-color: var(--border);
    }

    .btn-default:hover {
      background: var(--bg-hover);
      border-color: var(--border-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      border-color: var(--danger-hover);
    }

    /* 日志面板 */
    .log-box {
      width: 100%;
      height: 100%;
      background: var(--dark-bg);
      border-radius: var(--btn-radius);
      padding: 10px;
      overflow-y: auto;
      font-family: Consolas, monospace;
      font-size: 12px;
      color: #D4D4D4;
    }

    .log-line {
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .log-info {
      color: #61AFEF
    }

    .log-succ {
      color: #98C379
    }

    .log-err {
      color: #E06C75
    }

    .log-warn {
      color: #E5C07B
    }

    /* 弹窗 */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      opacity: 0;
      visibility: hidden;
      transition: .2s;
      padding: 20px;
    }

    .modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-inner {
      width: min(100%, 460px);
      background: #fff;
      border-radius: var(--card-radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .empty-tip {
      text-align: center;
      color: var(--text-tertiary);
      padding: 20px 0;
      font-size: 13px;
    }

    /* ========== 新增：右下角设置齿轮按钮 ========== */
    .setting-btn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      box-shadow: 0 3px 12px rgba(22, 93, 255, 0.3);
      font-size: 20px;
      cursor: pointer;
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .setting-btn:hover {
      background: var(--primary-hover);
      transform: scale(1.05);
    }

    /* ========== 响应式适配 ========== */
    /* 平板尺寸：保持左右分栏，仅压缩间距和内边距，样式完全不变 */
    @media (max-width: 1024px) {
      .wrapper {
        padding: 10px;
        gap: 10px
      }

      .section {
        gap: 10px
      }

      .card {
        padding: 14px;
        gap: 10px
      }

      .bottom-section .node-card {
        min-width: 220px
      }
    }

    /* 手机尺寸：布局改为上下堆叠，视觉样式和大屏完全一致 */
    @media (max-width: 768px) {
      html, body {
        overflow: auto;
        height: auto;
        min-height: 100vh
      }

      .wrapper {
        height: auto;
        min-height: 100vh;
        padding: 8px;
        gap: 8px;
      }

      .section {
        flex-direction: column;
        gap: 8px;
      }

      .top-section {
        flex: none;
        height: auto;
      }

      .bottom-section {
        flex: none;
        min-height: unset;
      }

      .bottom-section .node-card {
        min-width: unset;
        min-height: 200px;
      }

      .log-card {
        min-height: 300px
      }

      .card {
        padding: 12px;
        gap: 10px
      }

      /* 手机缩小齿轮按钮 */
      .setting-btn {
        width: 40px;
        height: 40px;
        font-size: 18px;
        right: 12px;
        bottom: 12px;
      }
    }

    /* 超低高度屏幕适配 */
    @media (max-height: 580px) {
      .wrapper {
        padding: 8px;
        gap: 8px
      }

      .card {
        padding: 10px;
        gap: 8px
      }

      .top-section {
        flex: 0 0 34%
      }

      textarea {
        min-height: 45px
      }

      .upload-area {
        padding: 12px
      }
    }
  </style>
</head>
<body>
<script src="./renderer.js"></script>
<div class="wrapper">
  <!-- 第一块：上半区，左右分文字、文件 -->
  <div class="section top-section">
    <!-- 左侧：文字传输 -->
    <div class="card">
      <div class="card-title">文字消息传输</div>
      <textarea id="msgInput" placeholder="请输入要传输的文字内容..."></textarea>
      <button class="btn btn-primary" onclick="sendText()">📤 发送文字</button>
    </div>

    <!-- 右侧：文件传输 -->
    <div class="card">
      <div class="card-title">文件传输上传</div>
      <div class="upload-area" id="uploadDom">
        <div>📁</div>
        <div>点击或拖拽文件到此处上传</div>
        <input type="file" id="fileInput" multiple>
        <div class="upload-tip" id="fileTip">未选择文件</div>
      </div>
      <button class="btn btn-primary" onclick="sendFile()">📤 提交文件</button>
    </div>
  </div>

  <!-- 第二块：下半区，左右分日志、节点 -->
  <div class="section bottom-section">
    <!-- 左侧：交互日志（占80%） -->
    <div class="card log-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="card-title">交互日志</div>
        <button class="btn btn-sm btn-danger" onclick="clearLog()">清空日志</button>
      </div>
      <div class="log-box" id="logBox"></div>
    </div>

    <!-- 右侧：节点配置（占20%，与日志等高） -->
    <div class="card node-card">
      <div class="card-title">节点配置</div>
      <button class="btn btn-primary" onclick="openNodeModal()">➕ 添加节点</button>
      <div class="node-list" id="nodeList"></div>
    </div>
  </div>
</div>

<!-- 右下角齿轮设置按钮【新增】 -->
<button class="setting-btn" onclick="openSettingModal()">⚙</button>

<!-- 节点弹窗 -->
<div class="modal" id="nodeModal">
  <div class="modal-inner">
    <div class="card-title">编辑/新增交互节点</div>
    <div class="form-item">
      <label class="form-label">节点名称</label>
      <input id="nodeName" placeholder="例如：业务系统A">
    </div>
    <div class="form-item">
      <label class="form-label">节点地址（IP:端口）</label>
      <input id="nodeAddr" placeholder="例如：192.168.1.1:8080 或 [::1]:8080">
      <div class="form-error" id="addrError">
        格式错误，仅支持 IPv4:端口（如 192.168.1.1:8080）或 [IPv6]:端口（如 [::1]:8080）
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-default" onclick="closeNodeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveNode()">保存</button>
    </div>
  </div>
</div>

<!-- 【新增】路径设置弹窗 -->
<div class="modal" id="settingModal">
  <div class="modal-inner">
    <div class="card-title">保存路径配置</div>
    <div class="form-item">
      <div style="display:flex;gap:8px;">
        <input id="savePathInput" placeholder="请选择文件夹路径" readonly style="flex:1;">
        <button class="btn btn-default" onclick="selectSaveFolder()">选择目录</button>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-default" onclick="closeSettingModal()">取消</button>
      <button class="btn btn-primary" onclick="saveSettingPath()">保存配置</button>
    </div>
  </div>
</div>

<script>
  let nodeData;
  let saveFolderPath
  let logData
  let selectedFileList = null;
  ;(async () => {
    nodeData = await getNodes()
    saveFolderPath = await getSaveFolderPath()
    logData = await getTraces()
    // 初始化路径输入框
    document.getElementById("savePathInput").value = saveFolderPath
    renderNode();
    renderLog();
    bindUpload();
  })()

  // 端口校验
  function isValidPort(port) {
    const p = parseInt(port, 10);
    return !isNaN(p) && p >= 1 && p <= 65535;
  }

  // IPv4校验
  function isValidIPv4(ip) {
    const parts = ip.split('.');
    if (parts.length !== 4) return false;
    return parts.every(part => {
      const num = parseInt(part, 10);
      return !isNaN(num) && num >= 0 && num <= 255 && part === num.toString();
    });
  }

  // IPv6校验
  function isValidIPv6(ip) {
    if (!ip) return false;
    if (ip.split('::').length > 2) return false;

    const full = ip.includes('::')
            ? ip.replace('::', ':'.repeat(9 - ip.split(':').length))
            : ip;

    const groups = full.split(':').filter(g => g !== '');
    if (groups.length < 1 || groups.length > 8) return false;

    return groups.every(g => /^[0-9a-fA-F]{1,4}$/.test(g));
  }

  // 节点地址总校验
  function validateNodeAddress(addr) {
    if (!addr || !addr.trim()) return false;
    const address = addr.trim();

    // IPv4:端口
    if (!address.startsWith('[')) {
      const lastColon = address.lastIndexOf(':');
      if (lastColon === -1) return false;
      const ip = address.substring(0, lastColon);
      const port = address.substring(lastColon + 1);
      return isValidIPv4(ip) && isValidPort(port);
    }

    // [IPv6]:端口
    if (address.startsWith('[') && address.includes(']:')) {
      const closeBracket = address.indexOf(']');
      const ip = address.substring(1, closeBracket);
      const port = address.substring(closeBracket + 2);
      return isValidIPv6(ip) && isValidPort(port);
    }

    return false;
  }

  // 文件上传绑定
  function bindUpload() {
    const wrap = document.getElementById("uploadDom");
    const tip = document.getElementById("fileTip");

    // 点击上传区域 → 弹出系统级文件选择框
    wrap.onclick = async () => {
      const paths = upload_files()
      paths
              .then(filePaths => {
                // 成功回调里拿到返回值
                if (filePaths.length) {
                  selectedFileList = filePaths;
                  tip.textContent = `已选${filePaths.length}个文件`;
                }
              })
              .catch(err => {
                // 失败回调处理错误
                pushLog("系统", "打开文件选择框失败：" + err, "log-error");
              });
    };

    // ========== 新增拖拽上传逻辑 ==========
    // 1. 初始化拖拽区域
    window.ea.bindDropArea('uploadDom');
    // 2. 监听拖拽完成事件，拿到路径数组
    wrap.addEventListener('file-drop', (e) => {
      const paths = e.detail;
      if (paths.length) {
        selectedFileList = paths;
        tip.textContent = `已选${paths.length}个文件`;
      }
    });
  }

  // 节点弹窗
  function openNodeModal(node = null) {
    const errorEl = document.getElementById("addrError");
    errorEl.style.display = 'none';

    if (node) {
      document.getElementById("nodeName").value = node.name;
      document.getElementById("nodeAddr").value = node.addr;
    } else {
      document.getElementById("nodeName").value = "";
      document.getElementById("nodeAddr").value = "";
    }
    document.getElementById("nodeModal").classList.add("show");
  }

  function closeNodeModal() {
    document.getElementById("nodeModal").classList.remove("show");
  }

  // 保存节点
  async function saveNode() {
    const nname = document.getElementById("nodeName").value.trim();
    const naddr = document.getElementById("nodeAddr").value.trim();
    const errorEl = document.getElementById("addrError");

    errorEl.style.display = 'none';

    if (!nname) {
      pushLog("系统", "节点名称不能为空", "log-err");
      return;
    }
    if (!naddr) {
      errorEl.style.display = 'block';
      pushLog("系统", "节点地址不能为空", "log-err");
      return;
    }

    if (!validateNodeAddress(naddr)) {
      errorEl.style.display = 'block';
      pushLog("系统", "节点地址格式错误", "log-err");
      return;
    }

    const idx = nodeData.findIndex(i => i.name === nname);
    if (idx != -1) {
      nodeData[idx].name = nname;
      nodeData[idx].address = naddr;
      updateNode(nname, naddr)
      pushLog("系统", "更新节点：" + nname, "log-info");
    } else {
      nodeData.push({id: Date.now() + "", name: nname, address: naddr});
      addNode(nname, naddr)
      pushLog("系统", "新增节点：" + nname, "log-succ");
    }
    nodeData = await getNodes()
    renderNode();
    closeNodeModal();
  }

  // 删除节点
  async function deleteNode(name) {
    const item = nodeData.find(i => i.name === name);
    if (!confirm("确认删除节点【" + item.name + "】？")) return;
    delNode(item.name)
    nodeData = await getNodes()
    renderNode();
    pushLog("系统", "已删除节点：" + item.name, "log-warn");
  }

  // 渲染节点列表
  function renderNode() {
    const listDom = document.getElementById("nodeList");
    if (nodeData.length === 0) {
      listDom.innerHTML = `<div class="empty-tip">暂无配置节点</div>`;
      return;
    }
    listDom.innerHTML = nodeData.map(item => `
    <div class="node-item">
      <div class="node-info">
        <div class="name">${item.name}</div>
        <div class="addr">${item.addr}</div>
      </div>
      <div class="node-opt">
        <button class="btn btn-sm btn-default" onclick='openNodeModal(${JSON.stringify(item).replace(/"/g, "&quot;")})'>编辑</button>
        <button class="btn btn-sm btn-danger" onclick="deleteNode('${item.name}')">删除</button>
      </div>
    </div>
  `).join("");
  }

  // 日志功能
  function pushLog(target, msg, type = "log-info") {
    const trace = {time: new Date().toLocaleString(), target, msg, type}
    if (logData.length > 200) logData.length = 200;
    addTrace(trace)
    renderLog()
  }

  function renderLog() {
    getTraces()
            .then(traces => {
              logData = traces
              const box = document.getElementById("logBox");
              if (logData.length === 0) {
                box.innerHTML = `<div class="empty-tip">暂无交互记录</div>`;
                return;
              }
              box.innerHTML = logData.map(l => `
    <div class="log-line ${l.type}">[${l.time}] [${l.target}] ${l.msg}</div>
  `).join("");
              box.scrollTop = 0;
            })
            .catch(err => {
              console.log(err)
            });
  }

  function clearLog() {
    if (!confirm("清空全部日志？")) return;
    clearTrace()
    renderLog();
    pushLog("系统", "日志已全部清空", "log-warn");
  }

  // 发送文字
  function sendText() {
    const text = document.getElementById("msgInput").value.trim();
    if (!text) return pushLog("系统", "请输入文字内容", "log-err");
    sendT(text)
    pushLog("本地", "发送文本：" + text, "log-succ");
    document.getElementById("msgInput").value = "";
  }

  // 发送文件
  function sendFile() {
    if (!selectedFileList || selectedFileList.length === 0) return pushLog("系统", "请选择上传文件", "log-err");
    for (let f of selectedFileList) {
      sendF(f)
      pushLog("本地", `上传文件：${f}`, "log-succ");
    }
    document.getElementById("fileInput").value = "";
    selectedFileList = null;
    document.getElementById("fileTip").textContent = "未选择文件";
  }

  // ==================== 新增设置弹窗JS ====================
  // 打开设置弹窗
  function openSettingModal() {
    document.getElementById("settingModal").classList.add("show");
  }

  // 关闭设置弹窗
  function closeSettingModal() {
    document.getElementById("settingModal").classList.remove("show");
  }

  // 选择文件夹（Electron渲染层调用主进程）
  async function selectSaveFolder() {
    // 调用主进程打开文件夹选择框，对应renderer.js中的方法
    const path = select_folder();
    path
            .then(folderPath => {
              // 成功回调里拿到返回值
              if (folderPath && folderPath.length > 0) {
                document.getElementById("savePathInput").value = folderPath;
              }
            })
            .catch(err => {
              // 失败回调处理错误
              pushLog("系统", "选择目录失败：" + err, "log-err");
            });
  }

  // 保存路径到本地存储
  function saveSettingPath() {
    const path = document.getElementById("savePathInput").value.trim();
    if (!path) {
      pushLog("系统", "请先选择保存文件夹", "log-warn");
      return;
    }
    saveFolderPath = path
    saveFolderPathToMain(saveFolderPath)
    pushLog("系统", "文件保存路径配置已保存：" + saveFolderPath, "log-succ");
    closeSettingModal();
  }
</script>
</body>
</html>
